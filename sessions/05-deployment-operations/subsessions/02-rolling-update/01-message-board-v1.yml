apiVersion: v1
kind: Namespace
metadata:
  name: rollout-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-board
  namespace: rollout-lab
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: message-board
  template:
    metadata:
      labels:
        app: message-board
        version: v1
    spec:
      containers:
        - name: app
          image: prashantdey/appk8stutorial:1.0
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: sqlite:////tmp/messages.db
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: message-board
  namespace: rollout-lab
spec:
  selector:
    app: message-board
  ports:
    - port: 80
      targetPort: 5000