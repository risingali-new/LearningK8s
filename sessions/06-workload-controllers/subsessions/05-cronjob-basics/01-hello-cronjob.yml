apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-hello
  namespace: daemonset-lab
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: cron-hello
        spec:
          restartPolicy: Never
          containers:
            - name: worker
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  echo "cron job ran at $(date)"
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
