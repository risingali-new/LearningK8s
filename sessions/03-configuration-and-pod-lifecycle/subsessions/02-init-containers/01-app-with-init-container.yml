apiVersion: v1
kind: Namespace
metadata:
  name: lifecycle-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-board-init
  namespace: lifecycle-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-board-init
  template:
    metadata:
      labels:
        app: message-board-init
    spec:
      initContainers:
        - name: prepare-db-file
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /work && touch /work/messages.db && echo init-complete"]
          volumeMounts:
            - name: app-work
              mountPath: /work
      containers:
        - name: app
          image: prashantdey/appk8stutorial:1.0
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: sqlite:////work/messages.db
          volumeMounts:
            - name: app-work
              mountPath: /work
      volumes:
        - name: app-work
          emptyDir: {}