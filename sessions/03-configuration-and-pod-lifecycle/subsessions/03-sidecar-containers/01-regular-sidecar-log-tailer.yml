apiVersion: v1
kind: Namespace
metadata:
  name: lifecycle-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-board-sidecar
  namespace: lifecycle-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-board-sidecar
  template:
    metadata:
      labels:
        app: message-board-sidecar
    spec:
      containers:
        - name: app
          image: prashantdey/appk8stutorial:1.0
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: sqlite:////tmp/messages.db
          volumeMounts:
            - name: sidecar-shared
              mountPath: /shared
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: health-watcher
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              touch /shared/sidecar-health.log
              while true; do
                if wget -q -T 2 -O /dev/null http://127.0.0.1:5000/; then
                  status=ok
                else
                  status=unreachable
                fi
                echo "$(date +%Y-%m-%dT%H:%M:%S%z) app_status=${status}" | tee -a /shared/sidecar-health.log
                sleep 5
              done
          volumeMounts:
            - name: sidecar-shared
              mountPath: /shared
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: sidecar-shared
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: message-board-sidecar
  namespace: lifecycle-lab
spec:
  selector:
    app: message-board-sidecar
  ports:
    - port: 80
      targetPort: 5000
