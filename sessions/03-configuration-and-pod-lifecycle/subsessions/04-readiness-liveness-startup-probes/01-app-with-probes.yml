apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-board-probes
  namespace: lifecycle-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: message-board-probes
  template:
    metadata:
      labels:
        app: message-board-probes
    spec:
      containers:
        - name: app
          image: prashantdey/appk8stutorial:1.0
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: sqlite:////tmp/messages.db
          startupProbe:
            httpGet:
              path: /
              port: 5000
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: message-board-probes
  namespace: lifecycle-lab
spec:
  selector:
    app: message-board-probes
  ports:
    - port: 80
      targetPort: 5000