apiVersion: v1
kind: Namespace
metadata:
  name: case-node-maintenance
  labels:
    training.k8s.io/session: "31"
    training.k8s.io/case-study: node-maintenance-and-disruption
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drain-safe-web
  namespace: case-node-maintenance
  labels:
    app.kubernetes.io/name: drain-safe-web
    training.k8s.io/session: "31"
    training.k8s.io/case-study: node-maintenance-and-disruption
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: drain-safe-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: drain-safe-web
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: drain-safe-web
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: drain-safe-web
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: drain-safe-web
  namespace: case-node-maintenance
  labels:
    app.kubernetes.io/name: drain-safe-web
    training.k8s.io/session: "31"
    training.k8s.io/case-study: node-maintenance-and-disruption
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: drain-safe-web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: drain-safe-web
  namespace: case-node-maintenance
  labels:
    app.kubernetes.io/name: drain-safe-web
    training.k8s.io/session: "31"
    training.k8s.io/case-study: node-maintenance-and-disruption
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: drain-safe-web
