apiVersion: v1
kind: Namespace
metadata:
  name: case-team-a
  labels:
    training.k8s.io/session: "31"
    training.k8s.io/case-study: iam-user-namespace-access
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: namespace-access-demo
  namespace: case-team-a
  labels:
    app.kubernetes.io/name: namespace-access-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: namespace-access-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: namespace-access-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: namespace-access-demo
  namespace: case-team-a
  labels:
    app.kubernetes.io/name: namespace-access-demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: namespace-access-demo
  ports:
    - name: http
      port: 80
      targetPort: http
