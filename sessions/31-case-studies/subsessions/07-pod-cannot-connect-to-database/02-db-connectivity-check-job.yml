apiVersion: batch/v1
kind: Job
metadata:
  name: db-connectivity-check
  namespace: case-db-connectivity
  labels:
    training.k8s.io/session: "31"
    training.k8s.io/case-study: pod-cannot-connect-to-database
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 90
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-connectivity-check
    spec:
      restartPolicy: Never
      containers:
        - name: postgres-client
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: postgres-db
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "Checking PostgreSQL readiness through Service DNS: ${PGHOST}:${PGPORT}"
              pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -t 5
              echo "Running a simple SQL query"
              psql -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -c "select 1 as db_connectivity_check;"
