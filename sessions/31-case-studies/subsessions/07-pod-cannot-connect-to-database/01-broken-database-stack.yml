apiVersion: v1
kind: Namespace
metadata:
  name: case-db-connectivity
  labels:
    training.k8s.io/session: "31"
    training.k8s.io/case-study: pod-cannot-connect-to-database
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: case-db-connectivity
  labels:
    training.k8s.io/session: "31"
    training.k8s.io/case-study: pod-cannot-connect-to-database
type: Opaque
stringData:
  POSTGRES_USER: app_user
  POSTGRES_PASSWORD: lab-password
  POSTGRES_DB: appdb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: case-db-connectivity
  labels:
    app.kubernetes.io/name: postgres-db
    training.k8s.io/session: "31"
    training.k8s.io/case-study: pod-cannot-connect-to-database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: case-db-connectivity
  labels:
    app.kubernetes.io/name: postgres-db
    training.k8s.io/session: "31"
    training.k8s.io/case-study: pod-cannot-connect-to-database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgres-db-typo
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
