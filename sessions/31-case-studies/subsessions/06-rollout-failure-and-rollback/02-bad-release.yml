apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollout-demo
  namespace: case-rollout
  labels:
    app.kubernetes.io/name: rollout-demo
    training.k8s.io/session: "31"
    training.k8s.io/case-study: rollout-failure-and-rollback
  annotations:
    kubernetes.io/change-cause: "bad release nginx:missing-batch16a-tag"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 60
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rollout-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rollout-demo
    spec:
      containers:
        - name: web
          image: nginx:missing-batch16a-tag
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
