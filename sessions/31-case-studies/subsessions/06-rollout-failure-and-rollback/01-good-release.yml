apiVersion: v1
kind: Namespace
metadata:
  name: case-rollout
  labels:
    training.k8s.io/session: "31"
    training.k8s.io/case-study: rollout-failure-and-rollback
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollout-demo
  namespace: case-rollout
  labels:
    app.kubernetes.io/name: rollout-demo
    training.k8s.io/session: "31"
    training.k8s.io/case-study: rollout-failure-and-rollback
  annotations:
    kubernetes.io/change-cause: "good release nginx:1.27-alpine"
spec:
  replicas: 3
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 60
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rollout-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rollout-demo
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rollout-demo
  namespace: case-rollout
  labels:
    app.kubernetes.io/name: rollout-demo
    training.k8s.io/session: "31"
    training.k8s.io/case-study: rollout-failure-and-rollback
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rollout-demo
  ports:
    - name: http
      port: 80
      targetPort: http
