apiVersion: apps/v1
kind: Deployment
metadata:
  name: runaway-workers
  namespace: case-cost-guardrails
  labels:
    app.kubernetes.io/name: runaway-workers
    owner: platform-training
    cost-center: batch16a
    environment: training
spec:
  replicas: 20
  selector:
    matchLabels:
      app.kubernetes.io/name: runaway-workers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runaway-workers
        owner: platform-training
        cost-center: batch16a
        environment: training
    spec:
      containers:
        - name: worker
          image: public.ecr.aws/docker/library/busybox:1.36
          command:
            - /bin/sh
            - -c
            - sleep 3600
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
