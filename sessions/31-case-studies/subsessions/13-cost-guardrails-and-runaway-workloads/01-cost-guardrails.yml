apiVersion: v1
kind: Namespace
metadata:
  name: case-cost-guardrails
  labels:
    owner: platform-training
    cost-center: batch16a
    environment: training
    training.k8s.io/session: "31"
    training.k8s.io/case-study: cost-guardrails-and-runaway-workloads
---
apiVersion: v1
kind: LimitRange
metadata:
  name: cost-defaults
  namespace: case-cost-guardrails
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "250m"
        memory: "256Mi"
      max:
        cpu: "500m"
        memory: "512Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cost-quota
  namespace: case-cost-guardrails
spec:
  hard:
    pods: "8"
    requests.cpu: "800m"
    requests.memory: "1Gi"
    limits.cpu: "2"
    limits.memory: "2Gi"
    services: "5"
    services.loadbalancers: "0"
    persistentvolumeclaims: "2"
    configmaps: "10"
    secrets: "10"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-aware-app
  namespace: case-cost-guardrails
  labels:
    app.kubernetes.io/name: cost-aware-app
    owner: platform-training
    cost-center: batch16a
    environment: training
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cost-aware-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cost-aware-app
        owner: platform-training
        cost-center: batch16a
        environment: training
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cost-aware-app
  namespace: case-cost-guardrails
  labels:
    app.kubernetes.io/name: cost-aware-app
    owner: platform-training
    cost-center: batch16a
    environment: training
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cost-aware-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cost-aware-app
  namespace: case-cost-guardrails
  labels:
    app.kubernetes.io/name: cost-aware-app
    owner: platform-training
    cost-center: batch16a
    environment: training
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cost-aware-app
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
