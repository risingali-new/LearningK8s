apiVersion: v1
kind: Namespace
metadata:
  name: case-tenant-a
  labels:
    tenant: team-a
    training.k8s.io/session: "31"
    training.k8s.io/case-study: namespace-tenant-isolation
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-defaults
  namespace: case-tenant-a
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      default:
        cpu: "250m"
        memory: "256Mi"
      max:
        cpu: "500m"
        memory: "512Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: case-tenant-a
spec:
  hard:
    pods: "6"
    requests.cpu: "500m"
    requests.memory: "1Gi"
    limits.cpu: "2"
    limits.memory: "2Gi"
    services: "5"
    services.loadbalancers: "0"
    secrets: "10"
    configmaps: "10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-developer
  namespace: case-tenant-a
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: case-tenant-a-developers
  namespace: case-tenant-a
subjects:
  - kind: Group
    name: case-tenant-a-developers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: tenant-developer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: case-tenant-a
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace-ingress
  namespace: case-tenant-a
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-web
  namespace: case-tenant-a
  labels:
    app.kubernetes.io/name: tenant-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tenant-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenant-web
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-web
  namespace: case-tenant-a
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tenant-web
  ports:
    - name: http
      port: 80
      targetPort: http
