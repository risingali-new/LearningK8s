apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-aware-app
  namespace: case-secret-rotation
  labels:
    app.kubernetes.io/name: secret-aware-app
    training.k8s.io/session: "31"
    training.k8s.io/case-study: secret-rotation-and-restart
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secret-aware-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secret-aware-app
    spec:
      containers:
        - name: app
          image: public.ecr.aws/docker/library/busybox:1.36
          env:
            - name: APP_SECRET_VERSION
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secret
                  key: APP_SECRET_VERSION
            - name: APP_SECRET_VALUE
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secret
                  key: APP_SECRET_VALUE
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /www
              echo "APP_SECRET_VERSION=${APP_SECRET_VERSION}" > /www/index.html
              httpd -f -p 8080 -h /www &
              while true; do
                echo "APP_SECRET_VERSION=${APP_SECRET_VERSION}"
                sleep 30
              done
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -n "$APP_SECRET_VERSION"
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: secret-aware-app
  namespace: case-secret-rotation
  labels:
    app.kubernetes.io/name: secret-aware-app
    training.k8s.io/session: "31"
    training.k8s.io/case-study: secret-rotation-and-restart
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: secret-aware-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: secret-aware-app
  namespace: case-secret-rotation
  labels:
    app.kubernetes.io/name: secret-aware-app
    training.k8s.io/session: "31"
    training.k8s.io/case-study: secret-rotation-and-restart
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secret-aware-app
