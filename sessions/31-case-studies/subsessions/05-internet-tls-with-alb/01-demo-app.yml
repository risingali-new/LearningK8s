apiVersion: v1
kind: Namespace
metadata:
  name: case-tls-ingress
  labels:
    training.k8s.io/session: "31"
    training.k8s.io/case-study: internet-tls-with-alb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tls-demo
  namespace: case-tls-ingress
  labels:
    app.kubernetes.io/name: tls-demo
    training.k8s.io/session: "31"
    training.k8s.io/case-study: internet-tls-with-alb
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tls-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tls-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: tls-demo
  namespace: case-tls-ingress
  labels:
    app.kubernetes.io/name: tls-demo
    training.k8s.io/session: "31"
    training.k8s.io/case-study: internet-tls-with-alb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tls-demo
  ports:
    - name: http
      port: 80
      targetPort: http
