apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: case-autoscaling
  labels:
    app.kubernetes.io/name: load-generator
    training.k8s.io/session: "31"
    training.k8s.io/case-study: autoscaling-under-load
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: load-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: load-generator
    spec:
      containers:
        - name: load-generator
          image: public.ecr.aws/docker/library/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - while true; do wget -q -O- http://scale-demo.case-autoscaling.svc.cluster.local >/dev/null; done
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
