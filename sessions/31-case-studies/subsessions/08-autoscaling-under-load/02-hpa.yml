apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: scale-demo
  namespace: case-autoscaling
  labels:
    app.kubernetes.io/name: scale-demo
    training.k8s.io/session: "31"
    training.k8s.io/case-study: autoscaling-under-load
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: scale-demo
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
