apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: case-secrets-app
  labels:
    training.k8s.io/session: "31"
    training.k8s.io/case-study: secrets-manager-to-pod
spec:
  provider:
    aws:
      service: SecretsManager
      region: REPLACE_WITH_AWS_REGION
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-runtime-secret
  namespace: case-secrets-app
  labels:
    training.k8s.io/session: "31"
    training.k8s.io/case-study: secrets-manager-to-pod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: app-runtime-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: REPLACE_WITH_SECRET_NAME
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: REPLACE_WITH_SECRET_NAME
        property: password
