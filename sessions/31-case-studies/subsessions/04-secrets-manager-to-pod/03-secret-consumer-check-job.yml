apiVersion: batch/v1
kind: Job
metadata:
  name: secret-consumer-check
  namespace: case-secrets-app
  labels:
    training.k8s.io/session: "31"
    training.k8s.io/case-study: secrets-manager-to-pod
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secret-consumer-check
    spec:
      restartPolicy: Never
      containers:
        - name: check
          image: public.ecr.aws/docker/library/busybox:1.36
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-runtime-secret
                  key: DB_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              test -n "${DB_USERNAME}"
              test -n "${DB_PASSWORD}"
              echo "Secret was injected into the Pod."
              echo "DB_USERNAME=${DB_USERNAME}"
              echo "DB_PASSWORD_LENGTH=${#DB_PASSWORD}"
